report_comment: >
  This report has been generated by the <a href="https://github.com/nf-core/hmfrnaseq/tree/dev" target="_blank">nf-core/hmfrnaseq</a>
  analysis pipeline.
report_section_order:
  "nf-core-hmfrnaseq-methods-description":
    order: -1000
  software_versions:
    order: -1001
  "nf-core-hmfrnaseq-summary":
    order: -1002

export_plots: true

disable_version_detection: true

# Normalize sample names across tools (display only, no files renamed).
# Samtools output embeds the input BAM filename internally (includes .redux suffix).
# FastQC outputs are per-lane with library_id and lane suffixes.
extra_fn_clean_exts:
  - ".redux"
  - type: regex
    pattern: "_[^_]+_L\\d+_\\d+$"
